<!DOCTYPE html>
<html>

<head>

<title>Live SOS Tracking</title>

<style>
html, body {
  margin:0;
  padding:0;
  height:100%;
}

#map {
  height:100%;
  width:100%;
}
</style>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD_jFNR3UDUiFMNza_Dz5vWStv6cUgO8ZUY"></script>

</head>

<body>

<div id="map"></div>

<script>

// read incident id
const params = new URLSearchParams(window.location.search)
const incidentId = params.get("incident")

// firebase config
const firebaseConfig = {
  apiKey: "AIzaSyAyUBR-SVWaXqASSJ3V8nbLdKN8vMlvDUo",
  authDomain: "astrasos-278a5.firebaseapp.com",
  projectId: "astrasos-278a5"
}

firebase.initializeApp(firebaseConfig)

const db = firebase.firestore()

// create map
const map = new google.maps.Map(document.getElementById("map"), {
  zoom: 16,
  center: { lat: 0, lng: 0 }
})

// marker
const marker = new google.maps.Marker({
  map: map,
  title: "Live Location"
})

// listen for updates
db.collection("live_locations")
.doc(incidentId)
.onSnapshot(function(doc){

  if(!doc.exists) return

  const data = doc.data()

  const lat = data.lat
  const lng = data.lng

  const position = { lat: lat, lng: lng }

  marker.setPosition(position)

  map.panTo(position)

})

</script>

</body>

</html>
